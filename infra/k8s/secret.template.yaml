apiVersion: v1
kind: Secret
metadata:
  name: dingdong-secrets
  namespace: dingdong
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  MYSQL_DATABASE: dingdong
  MYSQL_USER: dingdong
  MYSQL_PASSWORD: replace-me
  MYSQL_ROOT_PASSWORD: replace-me
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dingdong?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
  SPRING_DATASOURCE_USERNAME: dingdong
  SPRING_DATASOURCE_PASSWORD: replace-me
