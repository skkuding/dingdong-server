spring:
  application:
    name: dingdong-server
  datasource:
    url: jdbc:mariadb://localhost:3306/dingdong
    username: dingdong
    password: 1234

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  docker:
    compose:
      file: ./docker-compose.yml
      lifecycle-management: start-only