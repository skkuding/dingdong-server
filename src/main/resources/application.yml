spring:
  application:
    name: dingdong-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/dingdong?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:dingdong}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  docker:
    compose:
      file: ./docker-compose.yml
      lifecycle-management: start-only
